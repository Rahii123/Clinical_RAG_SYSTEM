name: Deploy Clinical RAG

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t clinical-rag .

      - name: Stop Old Container
        run: |
          docker stop rag-container || true
          docker rm rag-container || true

      - name: Run Container
        run: docker run -d -p 8000:8000 --name rag-container clinical-rag
